services:
  webapi:
    image: goldenpathaspnet-webapi
    build:
      context: ./src
      dockerfile: WebApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8080:8080"

  aspire:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    environment:
      ASPIRE_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
      ASPNETCORE_URLS: http://+:18888
      ASPIRE_DASHBOARD_OTLP_ENDPOINT_URL: http://+:18889
      ASPIRE_DASHBOARD_OTLP_HTTP_ENDPOINT_URL: http://+:18890
    ports:
      - "18888:18888" # UI

  collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./docker/collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "4317:4317" # OTLP/gRPC in
      - "4318:4318" # OTLP/HTTP in
    depends_on:
      - aspire
